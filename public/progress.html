<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1B5EFA">
    <title>Progress - BFT Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="/css/material.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">BFT Tracker</div>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="nav-links">
            <a href="/" class="nav-link">Log Workout</a>
            <a href="/plan.html" class="nav-link">Plan</a>
            <a href="/library.html" class="nav-link">Library</a>
            <a href="/progress.html" class="nav-link active">Progress</a>
            <a href="/all-workouts.html" class="nav-link">Workout Records</a>
        </div>
    </nav>

    <main class="container">
        <h1>Progress</h1>

        <div class="card">
            <div class="form-row-compact">
                <div class="form-group">
                    <label for="category-filter">Category</label>
                    <select id="category-filter" onchange="filterProgressExercises()">
                        <option value="">All Categories</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="exercise-search">Exercise</label>
                    <div class="exercise-search-container">
                        <input type="text" id="exercise-search" placeholder="Type to search exercises..."
                            oninput="filterProgressExercises()" onfocus="showProgressDropdown()" autocomplete="off">
                        <div id="exercise-dropdown" class="exercise-dropdown hidden"></div>
                    </div>
                    <input type="hidden" id="exercise-select-id">
                </div>
            </div>
        </div>

        <!-- Overview chart (shown when no exercise selected) -->
        <div class="card" id="overview-container">
            <h2>Most Logged Exercises</h2>
            <div class="chart-wrapper">
                <canvas id="overview-chart"></canvas>
            </div>
        </div>

        <!-- Exercise-specific chart (shown when exercise selected) -->
        <div class="card" id="chart-container" style="display: none;">
            <div class="progress-header">
                <h2 id="exercise-name">Exercise Progress</h2>
                <button class="btn btn-sm btn-success" id="log-exercise-btn" onclick="goToLogWorkout()">+1</button>
            </div>
            <div class="chart-wrapper">
                <canvas id="progress-chart"></canvas>
            </div>
            <div class="chart-legend">
                <label><input type="checkbox" id="show-weight" checked onchange="updateChart()"> Weight (kg)</label>
            </div>
        </div>

        <div class="card" id="stats-container" style="display: none;">
            <div class="stats-header">
                <h3>Statistics</h3>
                <button class="btn btn-sm btn-secondary" id="lib-btn" onclick="goToLibrary()">Lib</button>
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">Total Workouts</span>
                    <span class="stat-value" id="stat-total">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Max Weight</span>
                    <span class="stat-value" id="stat-max-weight">0 kg</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Latest</span>
                    <span class="stat-value" id="stat-latest">-</span>
                </div>
            </div>
        </div>

        <div class="card" id="history-container" style="display: none;">
            <div class="history-header">
                <h3>Workout History</h3>
                <div class="pagination-header" id="pagination-header" style="display: none;">
                    <button class="btn-page-nav" id="prev-page-btn-top" onclick="prevPage()" disabled>&lt;</button>
                    <span class="page-label" id="page-label" tabindex="0" role="button" aria-label="Edit page number" onclick="enterPageEdit()" onkeydown="onPageLabelKey(event)">1</span>
                    <input type="number" id="page-input" class="hidden" min="1" value="1" onblur="commitPageEdit()" onkeydown="onPageInputKey(event)">
                    <span id="page-info-header">/1</span>
                    <button class="btn-page-nav" id="next-page-btn-top" onclick="nextPage()" disabled>&gt;</button>
                </div>
            </div>
            <div id="workout-history"></div>
            <div class="pagination-controls pagination-bottom" id="pagination-bottom" style="display: none;">
                <button class="btn btn-sm btn-secondary" id="prev-page-btn" onclick="prevPage()" disabled>Prev</button>
                <span id="page-info-bottom"></span>
                <button class="btn btn-sm btn-secondary" id="next-page-btn" onclick="nextPage()" disabled>Next</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>BFT Workout Tracker v2.0 | Cloudflare Workers + D1</p>
    </footer>

    <div id="toast" class="toast hidden"></div>

    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script>
        let chart = null;
        let overviewChart = null;
        let progressionData = [];
        let cachedExercises = [];
        let exerciseFilterTimer = null;
        const MAX_DROPDOWN_ITEMS = 20;
        let selectedExerciseName = '';
        let currentPage = 1;
        const HISTORY_PAGE_SIZE = 10;

        document.addEventListener('DOMContentLoaded', async function() {
            // Read exercise ID from URL parameter or sessionStorage
            const urlParams = new URLSearchParams(window.location.search);
            let progressExerciseId = urlParams.get('exercise') || sessionStorage.getItem('progressExerciseId');
            if (progressExerciseId) {
                sessionStorage.removeItem('progressExerciseId');
                sessionStorage.removeItem('progressExerciseName');
            }

            // Set up nav immediately (no API needed)
            const navToggle = document.getElementById('nav-toggle');
            const navLinks = document.getElementById('nav-links');
            if (navToggle) {
                navToggle.addEventListener('click', () => {
                    navToggle.classList.toggle('active');
                    navLinks.classList.toggle('show');
                });
            }

            // If redirected with exercise ID, start loading progression data immediately
            // in parallel with page setup (don't wait for dropdowns)
            let progressionPromise = null;
            if (progressExerciseId) {
                progressionPromise = loadProgression(progressExerciseId);
            }

            // Load constants and exercises in parallel
            await Promise.all([loadConstants(), loadExercises()]);

            // Set exercise after exercises are loaded, update heading
            if (progressExerciseId) {
                document.getElementById('exercise-select-id').value = progressExerciseId;
                const ex = cachedExercises.find(e => e.id == progressExerciseId);
                if (ex) {
                    document.getElementById('exercise-search').value = ex.name;
                    selectedExerciseName = ex.name;
                }
                await progressionPromise;
                if (ex) {
                    document.getElementById('exercise-name').textContent = ex.name + ' Progress';
                }
            } else {
                // Show overview chart when no exercise is selected
                await loadOverview();
            }

            // Close dropdown when clicking outside
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.exercise-search-container')) {
                    hideProgressDropdown();
                }
            });
        });

        function filterProgressExercises() {
            clearTimeout(exerciseFilterTimer);
            exerciseFilterTimer = setTimeout(() => {
                const searchTerm = document.getElementById('exercise-search').value.trim();
                const searchTermLower = searchTerm.toLowerCase();
                const category = document.getElementById('category-filter').value;

                let source = cachedExercises;
                if (category) {
                    source = source.filter(ex => ex.category === category || (ex.categories && ex.categories.includes(category)));
                }

                if (searchTerm === '') {
                    renderProgressDropdown(source.slice(0, MAX_DROPDOWN_ITEMS), '', source.length);
                } else {
                    const filtered = source.filter(ex =>
                        ex.name.toLowerCase().includes(searchTermLower)
                    );
                    renderProgressDropdown(filtered.slice(0, MAX_DROPDOWN_ITEMS), searchTerm, filtered.length);
                }
                showProgressDropdown();
            }, 100);
        }

        function renderProgressDropdown(exercises, searchTerm = '', totalCount = 0) {
            const dropdown = document.getElementById('exercise-dropdown');

            if (exercises.length === 0) {
                dropdown.innerHTML = '<div class="exercise-option disabled">No exercises found</div>';
                return;
            }

            let html = exercises.map(ex => `
                <div class="exercise-option" onclick="selectProgressExercise(${ex.id}, '${ex.name.replace(/'/g, "\\'")}')">${ex.name}${ex.equipment_type ? ` <span class="exercise-equipment">(${ex.equipment_type})</span>` : ''}</div>
            `).join('');

            if (totalCount > exercises.length) {
                html += `<div class="exercise-option disabled" style="font-size:0.8rem; text-align:center;">Showing ${exercises.length} of ${totalCount} — type to narrow</div>`;
            }

            dropdown.innerHTML = html;
        }

        function selectProgressExercise(id, name) {
            document.getElementById('exercise-select-id').value = id;
            document.getElementById('exercise-search').value = name;
            selectedExerciseName = name;
            hideProgressDropdown();
            loadProgression();
        }

        function showProgressDropdown() {
            const dropdown = document.getElementById('exercise-dropdown');
            if (!dropdown.innerHTML.trim()) {
                const source = cachedExercises;
                renderProgressDropdown(source.slice(0, MAX_DROPDOWN_ITEMS), '', source.length);
            }
            dropdown.classList.remove('hidden');
        }

        function hideProgressDropdown() {
            document.getElementById('exercise-dropdown').classList.add('hidden');
        }

        function loadOverview() {
            // Use cached exercises from loadExercises() - no extra API call needed
            const exercisesWithLogs = cachedExercises
                .filter(ex => ex.workout_count > 0)
                .sort((a, b) => b.workout_count - a.workout_count)
                .slice(0, 10);

            if (exercisesWithLogs.length === 0) {
                document.getElementById('overview-container').innerHTML = `
                    <h2>Most Logged Exercises</h2>
                    <p class="text-muted">No workout logs yet. Start logging to see your progress!</p>
                `;
                return;
            }

            renderOverviewChart(exercisesWithLogs);
        }

        function renderOverviewChart(exercises) {
            const ctx = document.getElementById('overview-chart').getContext('2d');

            if (overviewChart) overviewChart.destroy();

            overviewChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: exercises.map(ex => ex.name.length > 20 ? ex.name.substring(0, 18) + '...' : ex.name),
                    datasets: [{
                        label: 'Workout Logs',
                        data: exercises.map(ex => ex.workout_count),
                        backgroundColor: 'rgba(100, 181, 246, 0.7)',
                        borderColor: 'rgba(100, 181, 246, 1)',
                        borderWidth: 1,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            title: { display: true, text: 'Number of Logs' },
                            ticks: {
                                stepSize: 1
                            }
                        },
                        y: {
                            ticks: {
                                font: { size: 11 }
                            }
                        }
                    },
                    onClick: (event, elements) => {
                        if (elements.length > 0) {
                            const index = elements[0].index;
                            const ex = exercises[index];
                            selectProgressExercise(ex.id, ex.name);
                        }
                    }
                }
            });
        }

        async function loadConstants() {
            try {
                const data = await api.getConstants();
                document.getElementById('category-filter').innerHTML =
                    '<option value="">All Categories</option>' +
                    data.categories.map(c => `<option value="${c}">${c}</option>`).join('');
            } catch (error) {
                console.error('Error loading constants:', error);
                showToast('Error loading constants: ' + (error.message || 'Unknown error'), 'error');
            }
        }

        async function loadExercises() {
            try {
                const data = await api.getExercises({});
                cachedExercises = data.exercises;
            } catch (error) {
                console.error('Error loading exercises:', error);
                showToast('Error loading exercises: ' + (error.message || 'Unknown error'), 'error');
            }
        }

        async function loadProgression(overrideExerciseId) {
            const exerciseId = overrideExerciseId || document.getElementById('exercise-select-id').value;
            currentPage = 1;
            if (!exerciseId) {
                // Show overview, hide exercise-specific sections
                document.getElementById('overview-container').style.display = 'block';
                document.getElementById('chart-container').style.display = 'none';
                document.getElementById('stats-container').style.display = 'none';
                document.getElementById('history-container').style.display = 'none';
                loadOverview();
                return;
            }

            // Hide overview, show exercise-specific sections
            document.getElementById('overview-container').style.display = 'none';

            try {
                const data = await api.getProgression(exerciseId);
                progressionData = data.progression;

                // Get exercise name
                const exerciseName = selectedExerciseName || 'Exercise';
                document.getElementById('exercise-name').textContent = exerciseName + ' Progress';

                // Always show the header with +1 button
                document.getElementById('chart-container').style.display = 'block';

                if (progressionData.length === 0) {
                    // No logs yet - show message but keep +1 button visible
                    document.getElementById('progress-chart').parentElement.innerHTML =
                        '<p class="text-muted">No workout data yet. Click +1 to log your first workout!</p>' +
                        '<canvas id="progress-chart"></canvas>';
                    document.getElementById('stats-container').style.display = 'none';
                    document.getElementById('history-container').style.display = 'none';
                    return;
                }

                updateChart();
                updateStats();
                updateHistory();

                document.getElementById('stats-container').style.display = 'block';
                document.getElementById('history-container').style.display = 'block';
            } catch (error) {
                console.error('Error loading progression:', error);
                showToast('Error loading progression: ' + (error.message || 'Unknown error'), 'error');
            }
        }

        function updateChart() {
            const showWeight = document.getElementById('show-weight').checked;

            const labels = progressionData.map(d => formatDate(d.workout_date));
            const datasets = [];

            if (showWeight) {
                datasets.push({
                    label: 'Weight (kg)',
                    data: progressionData.map(d => d.weight_kg),
                    borderColor: '#4CAF50',
                    backgroundColor: 'rgba(76, 175, 80, 0.1)',
                    tension: 0.1,
                });
            }

            if (chart) chart.destroy();

            const ctx = document.getElementById('progress-chart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: showWeight,
                            position: 'left',
                            title: { display: true, text: 'Weight (kg)' },
                        },
                    },
                },
            });
        }

        function updateStats() {
            const total = progressionData.length;
            const maxWeight = Math.max(...progressionData.map(d => d.weight_kg));
            const latest = progressionData[progressionData.length - 1];

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-max-weight').textContent = maxWeight + ' kg';
            document.getElementById('stat-latest').textContent = latest ?
                `${latest.weight_kg} kg` : '-';
        }

        // Extract the heaviest weight from a workout record
        // For variable mode, parse notes for "[Variable: 15/17.5/20kg × ...]" and return max
        // Otherwise return the stored weight_kg
        function getHeaviestWeight(workout) {
            if (workout.notes) {
                const match = workout.notes.match(/\[Variable:\s*([\d.\/]+)kg/);
                if (match) {
                    const weights = match[1].split('/').map(Number);
                    return Math.max(...weights);
                }
            }
            return workout.weight_kg;
        }

        function updateHistory() {
            const container = document.getElementById('workout-history');
            const reversed = [...progressionData].reverse();
            const totalCount = reversed.length;
            const totalPages = Math.max(1, Math.ceil(totalCount / HISTORY_PAGE_SIZE));

            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIdx = (currentPage - 1) * HISTORY_PAGE_SIZE;
            const endIdx = Math.min(startIdx + HISTORY_PAGE_SIZE, totalCount);
            const paginated = reversed.slice(startIdx, endIdx);

            container.innerHTML = paginated.map(w => `
                <div class="workout-item-expandable" data-workout-id="${w.id}">
                    <div class="workout-item-compact" onclick="toggleWorkoutDetail(this)">
                        <span class="history-date">${formatDate(w.workout_date)}</span>
                        <span class="history-details">${getHeaviestWeight(w)} kg</span>
                        <span class="workout-expand-icon">▶</span>
                    </div>
                    <div class="workout-item-detail hidden">
                        <div class="workout-detail-stats">${w.weight_kg}kg × ${w.reps} reps × ${w.sets} sets</div>
                        ${w.notes ? `<div class="workout-detail-notes">${w.notes}</div>` : ''}
                        ${w.tags ? `<div class="workout-detail-tags">${w.tags}</div>` : ''}
                        <div class="workout-detail-actions">
                            <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); goToWorkoutRecord(${w.id})">Edit</button>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('page-info-header').textContent = `/${totalPages}`;
            document.getElementById('page-info-bottom').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('page-input').value = currentPage;
            document.getElementById('page-input').max = totalPages;
            document.getElementById('page-label').textContent = currentPage;

            const showPagination = totalPages > 1;
            document.getElementById('pagination-header').style.display = totalCount > 0 ? 'flex' : 'none';
            document.getElementById('pagination-bottom').style.display = showPagination ? 'flex' : 'none';
            document.getElementById('prev-page-btn').disabled = currentPage <= 1;
            document.getElementById('next-page-btn').disabled = currentPage >= totalPages;
            document.getElementById('prev-page-btn-top').disabled = currentPage <= 1;
            document.getElementById('next-page-btn-top').disabled = currentPage >= totalPages;
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                updateHistory();
            }
        }

        function nextPage() {
            const totalPages = Math.max(1, Math.ceil(progressionData.length / HISTORY_PAGE_SIZE));
            if (currentPage < totalPages) {
                currentPage++;
                updateHistory();
            }
        }

        function goToPage() {
            const input = document.getElementById('page-input');
            const page = parseInt(input.value);
            const totalPages = Math.max(1, Math.ceil(progressionData.length / HISTORY_PAGE_SIZE));
            if (!isNaN(page) && page >= 1 && page <= totalPages) {
                currentPage = page;
                updateHistory();
            }
        }

        function enterPageEdit() {
            const label = document.getElementById('page-label');
            const input = document.getElementById('page-input');
            label.classList.add('hidden');
            input.classList.remove('hidden');
            input.value = currentPage;
            input.focus();
            input.select();
        }

        function exitPageEdit() {
            document.getElementById('page-label').classList.remove('hidden');
            document.getElementById('page-input').classList.add('hidden');
        }

        function commitPageEdit() {
            goToPage();
            exitPageEdit();
        }

        function onPageInputKey(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                e.target.blur();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                document.getElementById('page-input').value = currentPage;
                exitPageEdit();
            }
        }

        function onPageLabelKey(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                enterPageEdit();
            }
        }

        function toggleWorkoutDetail(header) {
            const detail = header.nextElementSibling;
            const icon = header.querySelector('.workout-expand-icon');
            const isOpen = !detail.classList.contains('hidden');
            if (isOpen) {
                detail.classList.add('hidden');
                icon.textContent = '▶';
            } else {
                detail.classList.remove('hidden');
                icon.textContent = '▼';
            }
        }

        function goToWorkoutRecord(workoutId) {
            sessionStorage.setItem('editWorkoutId', workoutId);
            window.location.href = '/all-workouts.html';
        }

        function goToLogWorkout() {
            const exerciseId = document.getElementById('exercise-select-id').value;
            if (exerciseId) {
                sessionStorage.setItem('logExerciseId', exerciseId);
                sessionStorage.setItem('logExerciseName', selectedExerciseName);
                window.location.href = '/';
            }
        }

        function goToLibrary() {
            const exerciseId = document.getElementById('exercise-select-id').value;
            if (exerciseId) {
                window.location.href = `/library.html?exercise=${exerciseId}`;
            }
        }
    </script>
</body>
</html>
